stages:
  - build
  - deploy

build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
    IMAGE_TAG_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >-
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      --build-arg NEXT_PUBLIC_TMDB_API_KEY=$NEXT_PUBLIC_TMDB_API_KEY
      -t $IMAGE_TAG -t $IMAGE_TAG_SHA .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_TAG_SHA
  only:
    - master

deploy-to-coolify:
  stage: deploy
  tags:
    - shell
  script:
    - echo "========================================="
    - echo "Triggering Coolify deployment..."
    - echo "========================================="
    - |
      echo "Deploying RottenBrains..."
      curl -X GET "http://10.10.20.22:8000/api/v1/deploy?uuid=nwcw8csoo4k040gwccgk00o4&force=true" \
        -H "Authorization: Bearer $COOLIFY_TOKEN" \
        -H "Accept: application/json" || true
    - echo "========================================="
    - echo "Deployment trigger sent to Coolify"
    - echo "========================================="
  only:
    - master
  needs: ['build-image']
