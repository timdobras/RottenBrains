stages:
  - build
  - deploy
  - notify
  - cleanup

# -------------------------------------------------------
# Merge Request: Build only (no push, no deploy)
# Validates the Docker image builds successfully
# -------------------------------------------------------
build-mr:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  script:
    - >-
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      --build-arg NEXT_PUBLIC_TMDB_API_KEY=$NEXT_PUBLIC_TMDB_API_KEY
      -t $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID .
  after_script:
    - docker system prune -af --volumes || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# -------------------------------------------------------
# Master: Build and push to registry
# -------------------------------------------------------
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
    IMAGE_TAG_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >-
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      --build-arg NEXT_PUBLIC_TMDB_API_KEY=$NEXT_PUBLIC_TMDB_API_KEY
      -t $IMAGE_TAG -t $IMAGE_TAG_SHA .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_TAG_SHA
  after_script:
    - docker system prune -af --volumes || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# -------------------------------------------------------
# Master: Deploy to Coolify
# -------------------------------------------------------
deploy-to-coolify:
  stage: deploy
  tags:
    - shell
  script:
    - echo "========================================="
    - echo "Triggering Coolify deployment..."
    - echo "========================================="
    - |
      echo "Deploying RottenBrains..."
      curl -X GET "http://10.10.20.22:8000/api/v1/deploy?uuid=nwcw8csoo4k040gwccgk00o4&force=true" \
        -H "Authorization: Bearer $COOLIFY_TOKEN" \
        -H "Accept: application/json" || true
    - echo "========================================="
    - echo "Deployment trigger sent to Coolify"
    - echo "========================================="
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs: ['build-image']

# -------------------------------------------------------
# Cleanup: Prune docker on the shell runner
# Removes dangling images, stopped containers, and build
# cache that accumulate on the runner host over time.
# Runs after every master pipeline, even if deploy fails.
# -------------------------------------------------------
cleanup-runner:
  stage: cleanup
  tags:
    - shell
  script:
    - echo "Pruning unused Docker resources on runner..."
    - docker system prune -af --volumes || true
    - echo "Cleanup complete. Disk usage:"
    - df -h / || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  when: always
  needs: ['deploy-to-coolify']
  allow_failure: true

# -------------------------------------------------------
# Sentry release + deploy notification
# Registers rotten-brains@<sha>, attaches commits, marks
# deployed to production. Requires CI var: SENTRY_AUTH_TOKEN.
# -------------------------------------------------------
sentry-release:
  stage: notify
  tags:
    - shell
  variables:
    SENTRY_URL: https://sentry.timdobras.com
    SENTRY_ORG: sentry
  before_script:
    # AdGuard on the homelab DNS blocks sentry.io, so we fetch the CLI binary
    # straight from GitHub releases (pinned for reproducibility).
    - mkdir -p "$HOME/.local/bin"
    - |
      if ! command -v sentry-cli >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/sentry-cli" ]; then
        curl -sL -o "$HOME/.local/bin/sentry-cli" \
          "https://github.com/getsentry/sentry-cli/releases/download/3.4.2/sentry-cli-Linux-x86_64"
        chmod +x "$HOME/.local/bin/sentry-cli"
      fi
    - export PATH="$HOME/.local/bin:$PATH"
    - sentry-cli --version
  script:
    - VERSION="rotten-brains@${CI_COMMIT_SHORT_SHA}"
    - sentry-cli releases new "$VERSION" -p rotten-brains
    - sentry-cli releases set-commits "$VERSION" --auto --ignore-missing
    - sentry-cli releases finalize "$VERSION"
    - sentry-cli releases deploys "$VERSION" new -e production -n "coolify-deploy-$CI_PIPELINE_ID"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs: ['deploy-to-coolify']
  allow_failure: true
