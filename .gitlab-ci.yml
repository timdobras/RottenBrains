stages:
  - build
  - deploy
  - notify
  - cleanup

# -------------------------------------------------------
# Merge Request: Build only (no push, no deploy)
# Validates the Docker image builds successfully
# -------------------------------------------------------
build-mr:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
  script:
    - >-
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      --build-arg NEXT_PUBLIC_TMDB_API_KEY=$NEXT_PUBLIC_TMDB_API_KEY
      -t $CI_REGISTRY_IMAGE:mr-$CI_MERGE_REQUEST_IID .
  after_script:
    - docker system prune -af --volumes || true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# -------------------------------------------------------
# Master: Build and push to registry
# -------------------------------------------------------
build-image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    IMAGE_TAG: $CI_REGISTRY_IMAGE:latest
    IMAGE_TAG_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >-
      docker build
      --build-arg NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL
      --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY
      --build-arg NEXT_PUBLIC_TMDB_API_KEY=$NEXT_PUBLIC_TMDB_API_KEY
      --build-arg SENTRY_AUTH_TOKEN=$SENTRY_AUTH_TOKEN
      --build-arg SENTRY_ORG=sentry
      --build-arg SENTRY_PROJECT=rotten-brains
      --build-arg SENTRY_RELEASE=rotten-brains@$CI_COMMIT_SHORT_SHA
      -t $IMAGE_TAG -t $IMAGE_TAG_SHA .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_TAG_SHA
  after_script:
    - docker system prune -af --volumes || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"

# -------------------------------------------------------
# Master: Deploy to Coolify
# -------------------------------------------------------
deploy-to-coolify:
  stage: deploy
  tags:
    - shell
  script:
    - echo "========================================="
    - echo "Triggering Coolify deployment..."
    - echo "========================================="
    - |
      echo "Deploying RottenBrains..."
      curl -X GET "http://10.10.20.22:8000/api/v1/deploy?uuid=nwcw8csoo4k040gwccgk00o4&force=true" \
        -H "Authorization: Bearer $COOLIFY_TOKEN" \
        -H "Accept: application/json" || true
    - echo "========================================="
    - echo "Deployment trigger sent to Coolify"
    - echo "========================================="
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs: ['build-image']

# -------------------------------------------------------
# Master: Build & deploy the rb-extractor monorepo service
# Path-gated to rb-extractor/** so the heavy Playwright
# image is NOT rebuilt on every normal app deploy.
# -------------------------------------------------------
build-extractor:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: '/certs'
    EXTRACTOR_IMAGE: $CI_REGISTRY_IMAGE/extractor
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - >-
      docker build
      --build-arg SENTRY_RELEASE=rotten-brains-extractor@$CI_COMMIT_SHORT_SHA
      -t $EXTRACTOR_IMAGE:latest -t $EXTRACTOR_IMAGE:$CI_COMMIT_SHORT_SHA ./rb-extractor
    # Smoke-test the freshly-built image BEFORE pushing: parse the worker entry
    # and import its full module graph (lib.mjs -> direct.mjs -> every resolver)
    # INSIDE the prod image. Catches missing files / missing deps / syntax errors
    # that "works on dev" (host files all present) silently hides — e.g. a
    # resolver not COPY'd into the image. Failure here blocks push + deploy.
    - |
      docker run --rm --entrypoint sh "$EXTRACTOR_IMAGE:$CI_COMMIT_SHORT_SHA" -c \
        "node --check worker.mjs && node --input-type=module -e \"import('./lib.mjs').then(()=>console.log('extractor module graph OK')).catch(e=>{console.error(e);process.exit(1)})\""
    - docker push $EXTRACTOR_IMAGE:latest
    - docker push $EXTRACTOR_IMAGE:$CI_COMMIT_SHORT_SHA
  after_script:
    - docker system prune -af --volumes || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - rb-extractor/**/*

deploy-extractor:
  stage: deploy
  tags:
    - shell
  variables:
    EXTRACTOR_APP: ajsh261us0je6vflr4ygftcn
    COOLIFY_API: http://10.10.20.22:8000
  script:
    # Pin the Coolify app to THIS commit's immutable image tag before deploying,
    # so Coolify can't serve a stale :latest. (build-extractor pushed this tag.)
    - echo "Pinning rb-extractor image tag to $CI_COMMIT_SHORT_SHA ..."
    - |
      curl -sf -X PATCH "$COOLIFY_API/api/v1/applications/$EXTRACTOR_APP" \
        -H "Authorization: Bearer $COOLIFY_TOKEN" -H "Content-Type: application/json" \
        -d "{\"docker_registry_image_tag\":\"$CI_COMMIT_SHORT_SHA\"}"
    - echo "Triggering Coolify deployment (rb-extractor)..."
    - |
      curl -X GET "$COOLIFY_API/api/v1/deploy?uuid=$EXTRACTOR_APP&force=true" \
        -H "Authorization: Bearer $COOLIFY_TOKEN" \
        -H "Accept: application/json" || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - rb-extractor/**/*
  needs: ['build-extractor']

# -------------------------------------------------------
# Cleanup: Prune docker on the shell runner
# Removes dangling images, stopped containers, and build
# cache that accumulate on the runner host over time.
# Runs after every master pipeline, even if deploy fails.
# -------------------------------------------------------
cleanup-runner:
  stage: cleanup
  tags:
    - shell
  script:
    - echo "Pruning unused Docker resources on runner..."
    - docker system prune -af --volumes || true
    - echo "Cleanup complete. Disk usage:"
    - df -h / || true
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  when: always
  needs: ['deploy-to-coolify']
  allow_failure: true

# -------------------------------------------------------
# Sentry release + deploy notification
# Registers rotten-brains@<sha>, attaches commits, marks
# deployed to production. Requires CI var: SENTRY_AUTH_TOKEN.
# -------------------------------------------------------
sentry-release:
  stage: notify
  tags:
    - shell
  variables:
    SENTRY_URL: https://sentry.timdobras.com
    SENTRY_ORG: sentry
  before_script:
    # AdGuard on the homelab DNS blocks sentry.io, so we fetch the CLI binary
    # straight from GitHub releases (pinned for reproducibility).
    - mkdir -p "$HOME/.local/bin"
    - |
      if ! command -v sentry-cli >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/sentry-cli" ]; then
        curl -sL -o "$HOME/.local/bin/sentry-cli" \
          "https://github.com/getsentry/sentry-cli/releases/download/3.4.2/sentry-cli-Linux-x86_64"
        chmod +x "$HOME/.local/bin/sentry-cli"
      fi
    - export PATH="$HOME/.local/bin:$PATH"
    - sentry-cli --version
  script:
    - VERSION="rotten-brains@${CI_COMMIT_SHORT_SHA}"
    - sentry-cli releases new "$VERSION" -p rotten-brains
    - sentry-cli releases set-commits "$VERSION" --auto --ignore-missing
    - sentry-cli releases finalize "$VERSION"
    - sentry-cli releases deploys "$VERSION" new -e production -n "coolify-deploy-$CI_PIPELINE_ID"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
  needs: ['deploy-to-coolify']
  allow_failure: true

# -------------------------------------------------------
# Sentry release for the rb-extractor worker (project
# rotten-brains-extractor). Only runs when rb-extractor
# changed — mirrors build/deploy-extractor's path gate.
# -------------------------------------------------------
sentry-release-extractor:
  stage: notify
  tags:
    - shell
  variables:
    SENTRY_URL: https://sentry.timdobras.com
    SENTRY_ORG: sentry
  before_script:
    - mkdir -p "$HOME/.local/bin"
    - |
      if ! command -v sentry-cli >/dev/null 2>&1 && [ ! -x "$HOME/.local/bin/sentry-cli" ]; then
        curl -sL -o "$HOME/.local/bin/sentry-cli" \
          "https://github.com/getsentry/sentry-cli/releases/download/3.4.2/sentry-cli-Linux-x86_64"
        chmod +x "$HOME/.local/bin/sentry-cli"
      fi
    - export PATH="$HOME/.local/bin:$PATH"
    - sentry-cli --version
  script:
    - VERSION="rotten-brains-extractor@${CI_COMMIT_SHORT_SHA}"
    - sentry-cli releases new "$VERSION" -p rotten-brains-extractor
    - sentry-cli releases set-commits "$VERSION" --auto --ignore-missing
    - sentry-cli releases finalize "$VERSION"
    - sentry-cli releases deploys "$VERSION" new -e production -n "coolify-deploy-$CI_PIPELINE_ID"
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
      changes:
        - rb-extractor/**/*
  needs: ['deploy-extractor']
  allow_failure: true
